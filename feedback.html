<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="feedback.css">
</head>
<body>
  <div class="bg-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <header class="header">
    <h1>Send Feedback to Md Babla Islam</h1>
    <p class="header-subtitle">I would love to hear from you ...</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="feedback-intro">
        <span class="intro-icon">&#128172;</span>
        <p>Got a suggestion, found a bug, or just want to say hi? Drop a message below and it'll be sent directly to the developer.</p>
      </div>

      <form id="feedbackForm" class="feedback-form">
        <div class="form-group">
          <label for="senderName">Your Name <span class="optional">(optional)</span></label>
          <input type="text" id="senderName" placeholder="Anonymous" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="messageType">Category</label>
          <div class="type-buttons">
            <button type="button" class="type-btn active" data-type="feedback">&#128173; Feedback</button>
            <button type="button" class="type-btn" data-type="bug">&#128027; Bug Report</button>
            <button type="button" class="type-btn" data-type="idea">&#128161; Idea</button>
            <button type="button" class="type-btn" data-type="other">&#128075; Other</button>
          </div>
        </div>

        <div class="form-group">
          <label for="messageText">Your Message <span class="required">*</span></label>
          <textarea id="messageText" rows="5" placeholder="Write your message here..." required></textarea>
          <span class="char-count"><span id="charCount">0</span> / 4096</span>
        </div>

        <button type="submit" id="sendBtn" class="btn btn-send">
          <span class="btn-icon">&#128232;</span> Send Message
        </button>

        <div id="statusMessage" class="status-message"></div>
      </form>

      <div class="back-nav">
        <a href="index.html" class="btn btn-back">
          <span class="btn-icon">&#127968;</span> Back to Games
        </a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('feedbackForm');
    const nameInput = document.getElementById('senderName');
    const messageInput = document.getElementById('messageText');
    const charCount = document.getElementById('charCount');
    const sendBtn = document.getElementById('sendBtn');
    const statusMessage = document.getElementById('statusMessage');
    const typeButtons = document.querySelectorAll('.type-btn');

    let selectedType = 'feedback';

    // Category selection
    typeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        typeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;
      });
    });

    // Character counter
    messageInput.addEventListener('input', () => {
      const len = messageInput.value.length;
      charCount.textContent = len;
      if (len > 4096) {
        messageInput.value = messageInput.value.slice(0, 4096);
        charCount.textContent = 4096;
      }
    });

    // Send to Telegram
    const BOT_TOKEN = '8048347530:AAHkmTHXTra8Zes3ZXMIRn69F6PStAYliNU';
    const CHAT_ID = '1638003826';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const message = messageInput.value.trim();
      if (!message) {
        showStatus('Please write a message.', 'error');
        return;
      }

      const name = nameInput.value.trim() || 'Anonymous';
      const typeEmoji = { feedback: '💬', bug: '🐛', idea: '💡', other: '👋' };

      const text = `${typeEmoji[selectedType] || '💬'} *New ${selectedType.charAt(0).toUpperCase() + selectedType.slice(1)}*\n\n` +
                   `👤 *From:* ${name}\n` +
                   `📂 *Category:* ${selectedType}\n\n` +
                   `📝 *Message:*\n${message}`;

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="btn-icon">&#9203;</span> Sending...';

      try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'Markdown',
          }),
        });

        const data = await response.json();

        if (data.ok) {
          showStatus('Message sent successfully! Thank you for your feedback.', 'success');
          form.reset();
          charCount.textContent = '0';
          typeButtons.forEach(b => b.classList.remove('active'));
          typeButtons[0].classList.add('active');
          selectedType = 'feedback';
        } else {
          showStatus('Failed to send. Please try again later.', 'error');
        }
      } catch (err) {
        showStatus('Network error. Please check your connection and try again.', 'error');
      }

      sendBtn.disabled = false;
      sendBtn.innerHTML = '<span class="btn-icon">&#128232;</span> Send Message';
    });

    function showStatus(msg, type) {
      statusMessage.textContent = msg;
      statusMessage.className = `status-message ${type}`;
      statusMessage.style.display = 'block';
      setTimeout(() => { statusMessage.style.display = 'none'; }, 5000);
    }
  </script>
</body>
</html>
